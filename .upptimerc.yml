# BA | Wisp — status page (Upptime). Mirrors bastamp-status / bascribe-status.
owner: BA-BlockchainAnalysis
repo: bawisp-status

sites:
  - name: BA Wisp
    url: https://bawisp.com
  - name: Anchoring pipeline
    url: https://bawisp.com/api/cron/batch?healthcheck=1
  - name: Polygon RPC
    url: https://polygon-bor-rpc.publicnode.com
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
    expectedStatusCodes:
      - 200
  - name: Bitcoin timestamp calendar
    url: https://alice.btc.calendar.opentimestamps.org

status-website:
  cname: status.bawisp.com
  name: BA | Wisp Status
  introTitle: "BA | Wisp status"
  introMessage: Live availability of bawisp.com, the anchoring pipeline, and the public networks the proofs depend on. No server — just GitHub Actions and Pages.
  navbar:
    - title: Status
      href: /
    - title: bawisp.com
      href: https://bawisp.com
